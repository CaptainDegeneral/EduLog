services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      DATABASE_URL: sqlite+aiosqlite:///./edulog.db
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    env_file:
      - .env
    ports:
      - "5173:80"
    depends_on:
      - backend
